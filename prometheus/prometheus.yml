global:
  scrape_interval: 20s
  scrape_timeout: 10s
  evaluation_interval: 20s

scrape_configs:
  - job_name: iris_metrics_nginx
    metrics_path: /api/monitor/metrics
    static_configs:
      - targets: ["nginx-webgateway:80"]
        labels:
          gateway: nginx

  - job_name: iris_metrics_apache
    metrics_path: /api/monitor/metrics
    static_configs:
      - targets: ["apache-webgateway:80"]
        labels:
          gateway: apache
