global:
  scrape_interval: 20s
  scrape_timeout: 10s
  evaluation_interval: 20s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: iris_metrics_nginx
    metrics_path: /api/monitor/metrics
    static_configs:
      - targets: ["nginx-webgateway:80"]
        labels:
          gateway: nginx

  - job_name: iris_metrics_apache
    metrics_path: /api/monitor/metrics
    static_configs:
      - targets: ["apache-webgateway:80"]
        labels:
          gateway: apache

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
