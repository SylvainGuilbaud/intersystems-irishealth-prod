services:
  iris:
    build:
      args:
        IMAGE: containers.intersystems.com/intersystems/irishealth:latest-em
      context: iris
    container_name: irishealth
    hostname: irishealth
    ports:
      - ${IRIS_PORT}:1972
      - ${HL7_HTTP_PORT_RANGE:-9980-9989}:${HL7_HTTP_PORT_RANGE:-9980-9989}
      - ${HL7_MLLP_PORT_RANGE:-9990-9999}:${HL7_MLLP_PORT_RANGE:-9990-9999}
    volumes:
      - iris-data:/iris-data
      - ./journal1:/journal1
      - ./journal2:/journal2
      - ./wij:/wij
      - ./iris/key/iris.key:/tmp/iris.key:ro
      - ./iris/python/iris_python_demo:/usr/irissys/mgr/python/iris_python_demo
      - ./merge.cpf:/merge.cpf
      - ./data:/data
    command: --key /tmp/iris.key
    restart: unless-stopped
    environment:
      - TZ=Europe/Paris
      - ISC_DATA_DIRECTORY=/iris-data
      - ISC_CPF_MERGE_FILE=/merge.cpf

  apache-webgateway:
    image: containers.intersystems.com/intersystems/webgateway:latest-em
    depends_on:
      - iris
    ports:
      - ${WEBGATEWAY_PORT_HTTP}:80
      - ${WEBGATEWAY_PORT_HTTPS}:443
    restart: unless-stopped
    environment:
    - ISC_CSP_CONF_FILE=/webgateway/CSP.conf
    - ISC_CSP_INI_FILE=/webgateway/CSP.ini
    volumes:
    - type: bind
      source: ./webgateway
      target: /webgateway
    - type: volume
      source: metrics-cache-data
      target: /metrics-cache
      read_only: true
    networks:
      - default
    
  nginx-webgateway:
    image: containers.intersystems.com/intersystems/webgateway-nginx:latest-preview
    container_name: nginx-gateway
    depends_on:
      - iris
    ports:
      - ${NGINX_PORT_HTTP:-8080}:80
    volumes:
      - ./nginx/CSP.conf:/opt/nginx/conf/CSP.conf
      - ./nginx/CSP.ini:/opt/webgateway/bin/CSP.ini
      - metrics-cache-data:/metrics-cache:ro
    restart: unless-stopped

  webgateway-live:
    image: containers.intersystems.com/intersystems/webgateway:latest-em
    depends_on:
      - iris
    restart: unless-stopped
    environment:
    - ISC_CSP_CONF_FILE=/webgateway/CSP-live.conf
    - ISC_CSP_INI_FILE=/webgateway/CSP.ini
    volumes:
    - type: bind
      source: ./webgateway
      target: /webgateway
    networks:
      - default

  metrics-cache:
    build:
      context: ./metrics-cache
    depends_on:
      - webgateway-live
    environment:
      - SOURCE_URL=http://webgateway-live:80/api/monitor/metrics
      - POLL_INTERVAL=20
      - REQUEST_TIMEOUT=8
      - OUTPUT_FILE=/shared/metrics.prom
    volumes:
      - metrics-cache-data:/shared
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    depends_on:
      - nginx-webgateway
      - apache-webgateway
      - metrics-cache
      - alertmanager
      - cadvisor
    ports:
      - ${PROMETHEUS_PORT_HTTP:-9090}:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - ${ALERTMANAGER_PORT_HTTP:-9093}:9093
    restart: unless-stopped

  alert-receiver:
    build:
      context: ./alert-receiver
    container_name: alert-receiver
    ports:
      - ${ALERT_RECEIVER_PORT_HTTP:-8088}:8080
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - ${CADVISOR_PORT_HTTP:-8085}:8080
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      - prometheus
    ports:
      - ${GRAFANA_PORT_HTTP:-3000}:3000
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
 
volumes:
  iris-data:
  prometheus-data:
  grafana-data:
  metrics-cache-data:
  # journal1:
  # journal2:
  # wij: