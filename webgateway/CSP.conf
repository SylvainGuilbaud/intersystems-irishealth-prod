# CSP config file

CSPModulePath "${ISC_PACKAGE_INSTALLDIR}/bin/"
CSPConfigPath "${ISC_PACKAGE_INSTALLDIR}/bin/"

# Serve cached metrics from shared volume to avoid transient CSP backend 503.
Alias /api/monitor/metrics /metrics-cache/metrics.prom

<Location /api/monitor/metrics>
    CSP Off
    ForceType text/plain
    Require all granted
</Location>

# Serve everything via Web Gateway except cached metrics endpoint.
<LocationMatch "^/(?!api/monitor/metrics$)">
    CSP On
</LocationMatch>

<Directory />
    Options MultiViews FollowSymLinks
    AllowOverride None
    Require all granted
    <FilesMatch "\.(log|ini|pid|exe|so)$">
        Require all denied
    </FilesMatch>
</Directory>

