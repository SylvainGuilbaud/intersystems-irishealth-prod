# CSP config file

CSPModulePath "${ISC_PACKAGE_INSTALLDIR}/bin/"
CSPConfigPath "${ISC_PACKAGE_INSTALLDIR}/bin/"

# Dedicated live gateway used by metrics-cache source polling.
<Location />
    CSP On
</Location>

<Directory />
    Options MultiViews FollowSymLinks
    AllowOverride None
    Require all granted
    <FilesMatch "\.(log|ini|pid|exe|so)$">
        Require all denied
    </FilesMatch>
</Directory>

# Redirect Help links
Redirect /csp/docbook/ https://docs.intersystems.com/irislatest/csp/docbook/DocBook.UI.Page.cls
Redirect /iris/csp/docbook/ https://docs.intersystems.com/irislatest/csp/docbook/DocBook.UI.Page.cls
