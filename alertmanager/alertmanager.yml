global:
  resolve_timeout: 5m

# Route every alert to a local webhook receiver. This keeps the public demo free of
# real SMTP / Slack / Teams / PagerDuty credentials. See the article for optional
# enterprise notification-channel configurations.
route:
  receiver: console-webhook
  group_by:
    - alertname
    - instance
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  - name: console-webhook
    webhook_configs:
      - url: http://alert-receiver:8080/alerts
        send_resolved: true

# Example: suppress lower-severity alerts for an instance already firing a critical one.
inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity=~"warning|info"
    equal:
      - instance
